spring:
  application:
    name: auth-service
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3307/mortgage_auth?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

app:
  user-token:
    secret: ${APP_USER_TOKEN_SECRET:dev-only-user-token-secret-change-me-1234567890}
    issuer: ${APP_USER_TOKEN_ISSUER:auth-service}
    audience: ${APP_USER_TOKEN_AUDIENCE:mortgage-loan-api}
    ttl-seconds: ${APP_USER_TOKEN_TTL_SECONDS:900}

management:
  endpoints:
    web:
      exposure:
        include: health,info

server:
  port: 8086
