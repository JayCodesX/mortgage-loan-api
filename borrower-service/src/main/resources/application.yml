spring:
  application:
    name: borrower-service
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3307/mortgage_borrower?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

app:
  user-token:
    provider: ${APP_USER_TOKEN_PROVIDER:internal}
    secret: ${APP_USER_TOKEN_SECRET:dev-only-user-token-secret-change-me-1234567890}
    issuer: ${APP_USER_TOKEN_ISSUER:auth-service}
    audience: ${APP_USER_TOKEN_AUDIENCE:mortgage-loan-api}
    jwk-set-uri: ${APP_USER_TOKEN_JWK_SET_URI:}
  service-token:
    secret: ${APP_SERVICE_TOKEN_SECRET:dev-only-borrower-service-token-secret-change-me-1234567890}
    issuer: ${APP_SERVICE_TOKEN_ISSUER:mortgage-loan-api}
    audience: ${APP_SERVICE_TOKEN_AUDIENCE:borrower-service}
    scope: ${APP_SERVICE_TOKEN_SCOPE:borrower:read}

management:
  endpoint:
    health:
      probes:
        enabled: true
  endpoints:
    web:
      exposure:
        include: health,info

server:
  port: 8087
