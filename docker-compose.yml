services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mortgage-loan-api
    environment:
      DB_URL: jdbc:mysql://mysql:3306/mortgage_loan_api?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      DB_USERNAME: root
      DB_PASSWORD: root
      CORS_ALLOWED_ORIGINS: http://localhost:8088,https://localhost:8443
    depends_on:
      mysql:
        condition: service_healthy
    expose:
      - "8080"

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api
    container_name: mortgage-loan-web
    depends_on:
      - api
    expose:
      - "80"

  edge:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: mortgage-loan-edge
    depends_on:
      - web
      - api
    ports:
      - "8088:80"
      - "8443:443"

  edge-prod:
    image: nginx:1.27-alpine
    profiles: ["prod"]
    container_name: mortgage-loan-edge-prod
    depends_on:
      - web
      - api
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.prod.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_www:/var/www/certbot
      - letsencrypt:/etc/letsencrypt

  certbot:
    image: certbot/certbot:latest
    profiles: ["prod"]
    container_name: mortgage-loan-certbot
    volumes:
      - certbot_www:/var/www/certbot
      - letsencrypt:/etc/letsencrypt

  mysql:
    image: mysql:8.4
    container_name: mortgage-loan-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: mortgage_loan_api
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  mysql_data:
  certbot_www:
  letsencrypt:
