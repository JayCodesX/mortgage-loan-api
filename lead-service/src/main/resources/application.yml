spring:
  application:
    name: lead-service
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3307/mortgage_lead?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

app:
  messaging:
    enabled: ${APP_MESSAGING_ENABLED:true}
    consumer-enabled: ${APP_MESSAGING_CONSUMER_ENABLED:true}
    queue-name: ${APP_MESSAGING_QUEUE_NAME:quote-lead-requests}
    endpoint: ${AWS_ENDPOINT:http://localhost:4566}
    region: ${AWS_REGION:us-east-1}
    poll-delay-ms: ${APP_MESSAGING_POLL_DELAY_MS:3000}
  lead-result-messaging:
    enabled: ${APP_LEAD_RESULT_MESSAGING_ENABLED:true}
    queue-name: ${APP_LEAD_RESULT_QUEUE_NAME:quote-lead-results}
    endpoint: ${AWS_ENDPOINT:http://localhost:4566}
    region: ${AWS_REGION:us-east-1}
  service-token:
    secret: ${APP_SERVICE_TOKEN_SECRET:dev-only-lead-service-token-secret-change-me-1234567890}
    issuer: ${APP_SERVICE_TOKEN_ISSUER:pricing-service}
    audience: ${APP_SERVICE_TOKEN_AUDIENCE:lead-service}
    scope: ${APP_SERVICE_TOKEN_SCOPE:lead:write}
  outbound-service-token:
    secret: ${APP_OUTBOUND_SERVICE_TOKEN_SECRET:dev-only-lead-result-secret-change-me-1234567890}
    issuer: ${APP_OUTBOUND_SERVICE_TOKEN_ISSUER:lead-service}
    audience: ${APP_OUTBOUND_SERVICE_TOKEN_AUDIENCE:mortgage-loan-api}
    scope: ${APP_OUTBOUND_SERVICE_TOKEN_SCOPE:lead:write}
    ttl-seconds: ${APP_OUTBOUND_SERVICE_TOKEN_TTL_SECONDS:300}

management:
  endpoints:
    web:
      exposure:
        include: health,info

server:
  port: 8085
