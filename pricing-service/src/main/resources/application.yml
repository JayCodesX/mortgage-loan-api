spring:
  application:
    name: pricing-service
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3307/mortgage_pricing?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      repositories:
        enabled: false
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

app:
  transport:
    type: ${APP_TRANSPORT_TYPE:noop}
  service-token:
    public-key: ${APP_SERVICE_TOKEN_PUBLIC_KEY:}
    issuer: ${APP_SERVICE_TOKEN_ISSUER:mortgage-loan-api}
    audience: ${APP_SERVICE_TOKEN_AUDIENCE:pricing-service}
    scope: ${APP_SERVICE_TOKEN_SCOPE:pricing:write}
  outbound-service-token:
    secret: ${APP_OUTBOUND_SERVICE_TOKEN_SECRET:dev-only-lead-service-token-secret-change-me-1234567890}
    issuer: ${APP_OUTBOUND_SERVICE_TOKEN_ISSUER:pricing-service}
    audience: ${APP_OUTBOUND_SERVICE_TOKEN_AUDIENCE:lead-service}
    scope: ${APP_OUTBOUND_SERVICE_TOKEN_SCOPE:lead:write}
    ttl-seconds: ${APP_OUTBOUND_SERVICE_TOKEN_TTL_SECONDS:300}

management:
  endpoint:
    health:
      probes:
        enabled: true
  endpoints:
    web:
      exposure:
        include: health,info

server:
  port: 8084
