spring:
  application:
    name: mortgage-loan-api
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3307/mortgage_quote_workflow?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      repositories:
        enabled: false
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
  internal-admin:
    borrower-base-url: ${APP_INTERNAL_ADMIN_BORROWER_BASE_URL:http://localhost:8087}
    pricing-base-url: ${APP_INTERNAL_ADMIN_PRICING_BASE_URL:http://localhost:8084}
    lead-base-url: ${APP_INTERNAL_ADMIN_LEAD_BASE_URL:http://localhost:8085}
  messaging:
    enabled: ${APP_MESSAGING_ENABLED:false}
    lead-result-queue-name: ${APP_LEAD_RESULT_QUEUE_NAME:quote-lead-results}
    notification-queue-name: ${APP_NOTIFICATION_QUEUE_NAME:quote-notification-events}
    lead-result-dlq-name: ${APP_LEAD_RESULT_DLQ_NAME:quote-lead-results-dlq}
    notification-dlq-name: ${APP_NOTIFICATION_DLQ_NAME:quote-notification-events-dlq}
    endpoint: ${AWS_ENDPOINT:http://localhost:4566}
    region: ${AWS_REGION:us-east-1}
    poll-delay-ms: ${APP_MESSAGING_POLL_DELAY_MS:3000}
  pricing-service:
    base-url: ${APP_PRICING_SERVICE_BASE_URL:http://localhost:8084}
  transport:
    type: ${APP_TRANSPORT_TYPE:noop}
  service-token:
    private-key: ${APP_SERVICE_TOKEN_PRIVATE_KEY:}
    key-id: ${APP_SERVICE_TOKEN_KEY_ID:harbor-dev-key-1}
    issuer: ${APP_SERVICE_TOKEN_ISSUER:mortgage-loan-api}
    audience: ${APP_SERVICE_TOKEN_AUDIENCE:pricing-service}
    scope: ${APP_SERVICE_TOKEN_SCOPE:pricing:write}
    ttl-seconds: ${APP_SERVICE_TOKEN_TTL_SECONDS:300}
  lead-result-token:
    secret: ${APP_LEAD_RESULT_TOKEN_SECRET:dev-only-lead-result-secret-change-me-1234567890}
    issuer: ${APP_LEAD_RESULT_TOKEN_ISSUER:lead-service}
    audience: ${APP_LEAD_RESULT_TOKEN_AUDIENCE:mortgage-loan-api}
    scope: ${APP_LEAD_RESULT_TOKEN_SCOPE:lead:write}
  notification-token:
    audience: ${APP_NOTIFICATION_TOKEN_AUDIENCE:notification-service}
    scope: ${APP_NOTIFICATION_TOKEN_SCOPE:notification:write}
  borrower-service:
    base-url: ${APP_BORROWER_SERVICE_BASE_URL:http://localhost:8087}
    audience: ${APP_BORROWER_SERVICE_AUDIENCE:borrower-service}
    scope: ${APP_BORROWER_SERVICE_SCOPE:borrower:read}
  user-token:
    provider: ${APP_USER_TOKEN_PROVIDER:internal}
    secret: ${APP_USER_TOKEN_SECRET:dev-only-user-token-secret-change-me-1234567890}
    issuer: ${APP_USER_TOKEN_ISSUER:auth-service}
    audience: ${APP_USER_TOKEN_AUDIENCE:mortgage-loan-api}
    jwk-set-uri: ${APP_USER_TOKEN_JWK_SET_URI:}

management:
  endpoint:
    health:
      probes:
        enabled: true
  endpoints:
    web:
      exposure:
        include: health,info

server:
  port: 8080
