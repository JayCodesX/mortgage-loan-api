spring:
  application:
    name: mortgage-loan-api
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3307/mortgage_loan_api?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  cloud:
    gateway:
      default-filters:
        - AddResponseHeader=X-Gateway, Mortgage-Loan-API
      routes:
        - id: borrower-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/borrowers/**
          filters:
            - StripPrefix=2
        - id: loan-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/loans/**
          filters:
            - StripPrefix=2
        - id: underwriting-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/underwriting/**
          filters:
            - StripPrefix=2

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway

server:
  port: 8080
